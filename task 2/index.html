<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChronoCraft Stopwatch</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">ChronoCraft</p>
        <h1>Stopwatch</h1>
      </div>
      <button id="themeToggle" class="icon-button" aria-label="Toggle dark mode">
        <span class="theme-icon">🌙</span>
      </button>
    </header>

    <main class="card" role="application" aria-label="Stopwatch">
      <section class="display-panel">
        <div class="display-label">
          <span>Elapsed time</span>
          <span class="status" id="statusText">Paused</span>
        </div>
        <div class="timer" id="timerDisplay">00:00:00:000</div>
      </section>

      <section class="controls">
        <button id="startPauseBtn" class="control-btn primary-btn" type="button">Start</button>
        <button id="lapBtn" class="control-btn secondary-btn" type="button" disabled>Lap</button>
        <button id="resetBtn" class="control-btn tertiary-btn" type="button">Reset</button>
      </section>

      <section class="lap-panel" aria-label="Lap times">
        <div class="lap-heading">
          <h2>Laps</h2>
          <span id="lapCount">0</span>
        </div>
        <ul id="lapList" class="lap-list" aria-live="polite"></ul>
      </section>

      <section class="shortcuts">
        <span>Space: Start/Pause</span>
        <span>L: Lap</span>
        <span>R: Reset</span>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
