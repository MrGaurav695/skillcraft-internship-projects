<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand__title">Premium Calculator</span>
        <span class="brand__subtitle">Reliable math for real use</span>
      </div>
      <button type="button" id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
        <span class="theme-toggle__icon">🌙</span>
        <span class="theme-toggle__text">Light mode</span>
      </button>
    </header>

    <main class="layout">
      <section class="calculator-card" aria-label="Calculator">
        <div class="display-panel" id="displayPanel">
          <div class="display-panel__expression" id="expressionDisplay">0</div>
          <div class="display-panel__result" id="resultDisplay">0</div>
        </div>

        <div class="button-grid" id="buttonGrid" role="group" aria-label="Calculator buttons">
          <button type="button" class="button button--secondary" data-action="clear">C</button>
          <button type="button" class="button button--secondary" data-action="delete">⌫</button>
          <button type="button" class="button button--secondary" data-action="percent">%</button>
          <button type="button" class="button button--operator" data-value="/">÷</button>

          <button type="button" class="button" data-value="7">7</button>
          <button type="button" class="button" data-value="8">8</button>
          <button type="button" class="button" data-value="9">9</button>
          <button type="button" class="button button--operator" data-value="*">×</button>

          <button type="button" class="button" data-value="4">4</button>
          <button type="button" class="button" data-value="5">5</button>
          <button type="button" class="button" data-value="6">6</button>
          <button type="button" class="button button--operator" data-value="-">−</button>

          <button type="button" class="button" data-value="1">1</button>
          <button type="button" class="button" data-value="2">2</button>
          <button type="button" class="button" data-value="3">3</button>
          <button type="button" class="button button--operator" data-value="+">+</button>

          <button type="button" class="button button--secondary" data-action="toggle-sign">±</button>
          <button type="button" class="button" data-value="0">0</button>
          <button type="button" class="button" data-action="decimal">.</button>
          <button type="button" class="button button--equals" data-action="equals">=</button>
        </div>
      </section>

      <aside class="history-card" aria-label="Calculation history">
        <div class="history-header">
          <div>
            <h2>History</h2>
            <p class="history-subtitle">Last calculations are stored locally.</p>
          </div>
          <button type="button" id="clearHistory" class="history-clear">Clear</button>
        </div>
        <div class="history-list" id="historyList"></div>
        <p class="history-note">Tap an entry to reuse it.</p>
      </aside>
    </main>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
